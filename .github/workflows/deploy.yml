name: Deploy

# Triggered when a GitHub Release is published.
# To deploy to production: create a Release in the GitHub UI (or via gh release create).
# The release event is the signal that a version is ready for production.
on:
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /srv/rebalancing-engine
            git fetch --tags
            git checkout ${{ github.event.release.tag_name }}
            docker compose build
            docker compose up -d
            echo "Deployed: ${{ github.event.release.tag_name }}"
