name: Deploy to production

# Triggered manually by Rufus (Accordant AI agent).
# AntiGravity does not trigger this workflow — production is Rufus's responsibility.
#
# How the release cycle works:
#   1. AntiGravity develops on main and opens a GitHub Issue labelled
#      'release-ready' when a version is considered production-ready.
#   2. Rufus reviews main, verifies on the dev environment, and triggers
#      this workflow when satisfied.
#   3. Post-deploy issues are reported back via GitHub Issues ('deployment-feedback').
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA)"
        required: false
        default: "main"

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /srv/rebalancing-engine
            git fetch origin
            git checkout ${{ github.event.inputs.ref || 'main' }}
            git pull origin ${{ github.event.inputs.ref || 'main' }} 2>/dev/null || true
            docker compose build
            docker compose up -d --force-recreate
            # Extract built frontend from image to host path for nginx
            docker cp rebalancing-engine:/app/web/dist/. ./web/dist/
            echo "Deployed: $(git rev-parse --short HEAD)"
