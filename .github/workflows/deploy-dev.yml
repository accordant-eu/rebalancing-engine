name: Deploy (ops/staging)

# Auto-deploys to ops.rebalancing.accordant.eu on every push to ops.
# This is Rufus's staging environment — not used by AntiGravity.
on:
  push:
    branches: [ops]

jobs:
  deploy:
    name: Deploy to staging (ops)
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /srv/rebalancing-engine
            git fetch origin
            git checkout ops
            git pull origin ops
            docker compose -f docker-compose.dev.yml build
            docker compose -f docker-compose.dev.yml up -d
            echo "Staging (ops) deployed: $(git rev-parse --short HEAD)"
