name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7
    - name: Use Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '20.x'
    - name: Install dependencies
      run: npm ci
    - name: Check formatting
      run: npm run format -- --check || echo "Formatting checks skipped or failed softly"
    - name: Lint
      run: npm run lint
    - name: Typecheck
      run: npx tsc --noEmit
    - name: Build
      run: npm run build
    - name: Test
      run: npm test -- --runInBand
